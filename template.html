<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI日报 · ___DATE___</title>
<style>
:root {
  --bg: #f5f5f7;
  --white: #ffffff;
  --black: #000000;
  --text: #1d1d1f;
  --text-secondary: rgba(0,0,0,.72);
  --text-tertiary: rgba(0,0,0,.42);
  --blue: #0071e3;
  --blue-active: #0066cc;
  --border: rgba(0,0,0,.06);
  --shadow: rgba(0,0,0,.08) 0px 2px 14px;
  --shadow-hover: rgba(0,0,0,.12) 0px 4px 24px;
  --radius-card: 14px;
  --radius-pill: 980px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -.01em;
}

/* Dark hero */
.hero {
  background: var(--black);
  color: var(--white);
  text-align: center;
  padding: 72px 24px 56px;
}
.hero .eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .5em;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
  margin-bottom: 10px;
}
.hero h1 {
  font-size: 48px;
  font-weight: 600;
  line-height: 1.07;
  letter-spacing: -.015em;
}
.hero .sub {
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,.5);
  margin-top: 8px;
  letter-spacing: -.01em;
}

/* Container */
.container { max-width: 680px; margin: 0 auto; padding: 0 20px; }

/* Audio player bar */
.audio-bar {
  background: var(--white);
  border-radius: var(--radius-card);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: -28px auto 24px;
  max-width: 420px;
  box-shadow: var(--shadow);
  position: relative;
  z-index: 2;
}
.audio-bar .label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-tertiary);
  white-space: nowrap;
}
.audio-bar audio { flex: 1; min-width: 0; height: 28px; }

/* Focus card — deference: content leads */
.focus-card {
  background: var(--white);
  border-radius: var(--radius-card);
  padding: 24px 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.focus-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: var(--blue);
  border-radius: 0 2px 2px 0;
}
.focus-card .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 6px;
}
.focus-card p {
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.47;
  letter-spacing: -.01em;
}

/* Cards */
.card {
  background: var(--white);
  border-radius: var(--radius-card);
  padding: 24px 28px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  transition: box-shadow .25s ease;
}
.card:hover { box-shadow: var(--shadow-hover); }
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-header h2 {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.card-header .badge {
  font-size: 11px;
  font-weight: 500;
  color: var(--blue);
  background: rgba(0,113,227,.08);
  padding: 2px 10px;
  border-radius: var(--radius-pill);
}

/* Top list */
.item-list { list-style: none; }
.item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.item:last-child { border-bottom: none; padding-bottom: 0; }
.item .rank {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  min-width: 22px;
  height: 22px;
  text-align: center;
  line-height: 22px;
  background: var(--bg);
  border-radius: 6px;
  margin-top: 2px;
}
.item .body { flex: 1; min-width: 0; }
.item .name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.item .desc {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  margin-top: 1px;
  line-height: 1.5;
}
.item .opp {
  font-size: 13px;
  font-weight: 400;
  color: var(--blue);
  margin-top: 4px;
  display: inline-block;
  cursor: default;
}
.item .opp:hover { color: var(--blue-active); }

/* Pulse tags */
.pulse-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.pulse-tag {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 12px;
  border-radius: var(--radius-pill);
  background: var(--bg);
  color: var(--text-secondary);
  letter-spacing: -.01em;
}
.pulse-tag:first-child {
  background: rgba(0,113,227,.08);
  color: var(--blue);
}
.pulse-body {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Deep items */
.deep-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.deep-item:last-child { border-bottom: none; padding-bottom: 0; }
.deep-item h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
  letter-spacing: -.01em;
}
.deep-item p, .deep-item li {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.6;
}
.deep-item ul { padding-left: 18px; }
.deep-item li { margin: 3px 0; }

/* Footer — blue link pill */
.footer {
  text-align: center;
  padding: 36px 0 52px;
}
.footer a {
  display: inline-block;
  font-size: 14px;
  font-weight: 500;
  color: var(--blue-active);
  text-decoration: none;
  padding: 4px 18px;
  border: 1px solid var(--blue-active);
  border-radius: var(--radius-pill);
  transition: all .2s;
}
.footer a:hover {
  background: var(--blue-active);
  color: var(--white);
}

@media (max-width: 480px) {
  .hero { padding: 52px 20px 40px; }
  .hero h1 { font-size: 32px; }
  .focus-card { padding: 18px 16px; }
  .card { padding: 18px 16px; }
  .audio-bar { margin-left: 12px; margin-right: 12px; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="eyebrow">AI 日报</div>
  <h1>___DATE___</h1>
  <div class="sub">每天早 6 点 · 小关出品</div>
</div>

<div class="container">

<div class="audio-bar">
  <span class="label">收听</span>
  <audio controls preload="none" style="height:28px">
    <source src="___DATE___.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="focus-card">
  <div class="label">今日焦点</div>
  <p>___SUMMARY___</p>
</div>

___CONTENT___

<div class="footer">
  <a href="https://daily.guancn.me">查看全部历史</a>
</div>

</div>

</body>
</html>
