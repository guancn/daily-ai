<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI日报 · ___DATE___</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --warm-bg: #f6f5f4;
  --white: #ffffff;
  --text: rgba(0,0,0,.92);
  --text-secondary: #615d59;
  --text-muted: #a39e98;
  --blue: #0075de;
  --border: rgba(0,0,0,.08);
  --radius: 12px;
  --shadow: rgba(0,0,0,.03) 0px 2px 8px, rgba(0,0,0,.02) 0px 1px 3px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--warm-bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* 顶栏 */
.header {
  max-width: 700px;
  margin: 0 auto;
  padding: 48px 24px 0;
  text-align: center;
}
.header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.header .date {
  font-size: 28px;
  font-weight: 700;
  margin-top: 4px;
  letter-spacing: -.4px;
}
.header .sub {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* 核心容器 */
.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* 卡片 */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

/* 今日结论 */
.summary {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-secondary);
}
.summary strong {
  color: var(--text);
  font-weight: 600;
}

/* 音频播放器 — 紧凑、不抢眼 */
.audio-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--warm-bg);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
.audio-wrap audio {
  flex: 1;
  min-width: 0;
  height: 36px;
  border-radius: 6px;
}
.audio-wrap .label {
  white-space: nowrap;
  font-size: 12px;
  color: var(--text-muted);
}

/* 章节标题 */
.section-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  margin: 28px 0 12px;
  padding: 0 4px;
  letter-spacing: -.2px;
}

/* TOP 10 列表 */
.item-list { list-style: none; }
.item {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.item:last-child { border-bottom: none; }
.item .rank {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  min-width: 24px;
  text-align: right;
  line-height: 1.5;
}
.item .body { flex: 1; min-width: 0; }
.item .name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
}
.item .desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 2px;
  line-height: 1.5;
}
.item .opp {
  font-size: 13px;
  color: var(--blue);
  margin-top: 4px;
  font-weight: 500;
}

/* 市场脉搏 */
.pulse-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.pulse-tag {
  display: inline-block;
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 999px;
  font-weight: 500;
  background: #f0eeed;
  color: var(--text-secondary);
}
.pulse-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* 深度延伸 */
.deep-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.deep-item:last-child { border-bottom: none; }
.deep-item h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.deep-item p, .deep-item li {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}
.deep-item ul { padding-left: 18px; }
.deep-item li { margin: 3px 0; }
.deep-item .tag {
  display: inline-block;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 4px;
  background: #f0eeed;
  color: var(--text-secondary);
  margin-right: 3px;
  font-weight: 500;
}

/* 页脚 */
.footer {
  margin-top: 40px;
  padding: 20px 0;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
}
.footer a {
  color: var(--text-muted);
  text-decoration: underline;
  text-underline-offset: 3px;
}

@media (max-width: 480px) {
  .header { padding-top: 32px; }
  .header .date { font-size: 22px; }
  .card { padding: 18px 16px; }
  .audio-wrap { flex-wrap: wrap; }
  .container { padding: 16px 12px 40px; }
  .item { gap: 10px; }
  .item .rank { min-width: 20px; font-size: 13px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>AI 日报</h1>
  <div class="date">___DATE___</div>
  <div class="sub">每天早 6 点 · 小关出品</div>
</div>

<div class="container">

<div class="card">
  <div class="audio-wrap">
    <span class="label">🎧 听日报</span>
    <audio controls preload="none">
      <source src="___DATE___.mp3" type="audio/mpeg">
    </audio>
  </div>
  <div class="summary">___SUMMARY___</div>
</div>

___CONTENT___

<div class="footer">
  <a href="https://daily.guancn.me">📋 查看历史</a>
</div>

</div>

</body>
</html>
