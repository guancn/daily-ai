<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI日报 · ___DATE___</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white: #ffffff;
  --navy: #061b31;
  --slate: #64748d;
  --slate-dark: #273951;
  --purple: #533afd;
  --purple-hover: #4434d4;
  --purple-light: #b9b9f9;
  --border: #e5edf5;
  --green: #15be53;
  --green-bg: rgba(21,190,83,.12);
  --shadow: rgba(50,50,93,.12) 0px 6px 18px -8px, rgba(0,0,0,.06) 0px 3px 8px -4px;
  --radius: 6px;
  --bg-alt: #f8faff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
  background: var(--white);
  color: var(--slate);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.header {
  max-width: 680px;
  margin: 0 auto;
  padding: 52px 24px 0;
  text-align: center;
}
.header .eyebrow {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--purple);
}
.header h1 {
  font-size: 36px;
  font-weight: 300;
  letter-spacing: -.6px;
  color: var(--navy);
  margin-top: 2px;
}
.header .sub {
  font-size: 15px;
  font-weight: 300;
  color: var(--slate);
  margin-top: 4px;
}

.container { max-width: 600px; margin: 0 auto; padding: 28px 20px 60px; }

/* 音频播放器 — 紧凑条 */
.audio-card {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
}
.audio-card .label {
  font-size: 12px;
  font-weight: 500;
  color: var(--slate);
  white-space: nowrap;
}
.audio-card audio {
  flex: 1;
  min-width: 0;
  height: 30px;
  border-radius: 4px;
}

/* 今日焦点 */
.focus-card {
  background: linear-gradient(135deg, var(--bg-alt) 0%, var(--white) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.focus-card .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 6px;
}
.focus-card p {
  font-size: 16px;
  font-weight: 300;
  color: var(--navy);
  line-height: 1.6;
}

/* 白色卡片 */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--slate-dark);
  margin-bottom: 14px;
}

/* TOP 列表 */
.item-list { list-style: none; }
.item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.item:last-child { border-bottom: none; }
.item .rank {
  font-size: 13px;
  font-weight: 500;
  color: var(--purple-light);
  min-width: 20px;
  text-align: right;
  line-height: 1.5;
}
.item .body { flex: 1; min-width: 0; }
.item .name {
  font-size: 15px;
  font-weight: 500;
  color: var(--navy);
}
.item .desc {
  font-size: 14px;
  font-weight: 300;
  color: var(--slate);
  margin-top: 1px;
  line-height: 1.5;
}
.item .opp {
  font-size: 13px;
  font-weight: 400;
  color: var(--purple);
  margin-top: 3px;
}

/* 脉搏 */
.pulse-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}
.pulse-tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 10px;
  border-radius: 3px;
  background: var(--bg-alt);
  color: var(--slate-dark);
  border: 1px solid var(--border);
}
.pulse-body {
  font-size: 14px;
  font-weight: 300;
  color: var(--slate);
  line-height: 1.7;
}

/* 深度 */
.deep-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.deep-item:last-child { border-bottom: none; }
.deep-item h3 {
  font-size: 14px;
  font-weight: 500;
  color: var(--navy);
  margin-bottom: 2px;
}
.deep-item p, .deep-item li {
  font-size: 14px;
  font-weight: 300;
  color: var(--slate);
  line-height: 1.7;
}
.deep-item ul { padding-left: 18px; }
.deep-item li { margin: 2px 0; }

/* 页脚 */
.footer {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  text-align: center;
}
.footer a {
  font-size: 13px;
  font-weight: 400;
  color: var(--purple);
  text-decoration: none;
}
.footer a:hover { color: var(--purple-hover); text-decoration: underline; }

@media (max-width: 480px) {
  .header { padding-top: 36px; }
  .header h1 { font-size: 28px; }
  .card { padding: 16px 14px; }
  .focus-card { padding: 16px 14px; }
  .container { padding: 20px 12px 40px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">AI 日报</div>
  <h1>___DATE___</h1>
  <div class="sub">每天早 6 点 · 小关出品</div>
</div>

<div class="container">

<div class="audio-card">
  <span class="label">🎧 收听</span>
  <audio controls preload="none">
    <source src="___DATE___.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="focus-card">
  <div class="label">今日焦点</div>
  <p>___SUMMARY___</p>
</div>

___CONTENT___

<div class="footer">
  <a href="https://daily.guancn.me">查看全部历史 →</a>
</div>

</div>

</body>
</html>
