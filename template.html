<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI日报 - ___DATE___</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card-hover: #222240;
    --accent: #6c5ce7;
    --accent2: #00cec9;
    --accent3: #fd79a8;
    --gold: #fdcb6e;
    --text: #e0e0f0;
    --text-muted: #8888aa;
    --border: #2a2a45;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
  }

  /* 顶部渐变 */
  .hero {
    background: linear-gradient(135deg, #1a1a3e 0%, #0f0f1a 50%, #1a0f2e 100%);
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(108,92,231,.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(0,206,201,.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .hero h1 {
    font-size: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    letter-spacing: 2px;
  }
  .hero .date {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 6px;
    position: relative;
  }
  .hero .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white;
    font-size: 11px;
    padding: 3px 12px;
    border-radius: 20px;
    margin-top: 10px;
    position: relative;
    letter-spacing: 1px;
  }

  .container { max-width: 880px; margin: 0 auto; padding: 24px 20px 60px; }

  /* 今日结论 */
  .summary {
    background: linear-gradient(135deg, rgba(108,92,231,.1), rgba(0,206,201,.05));
    border: 1px solid rgba(108,92,231,.2);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 28px;
    font-size: 15px;
    line-height: 1.7;
    color: #c8c8e8;
    border-left: 4px solid var(--accent);
  }
  .summary strong { color: var(--accent2); }
  .summary em { color: var(--gold); font-style: normal; }

  /* 章节标题 */
  .section-title {
    font-size: 18px;
    margin: 32px 0 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .icon { font-size: 20px; }

  /* TOP 10 卡片网格 */
  .rank-grid { display: flex; flex-direction: column; gap: 10px; }
  .rank-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 12px;
    align-items: start;
    transition: all .2s;
    cursor: default;
  }
  .rank-card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .rank-card .num {
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 36px;
  }
  .rank-card .name {
    font-size: 15px;
    font-weight: 600;
    color: #e8e8ff;
  }
  .rank-card .highlight {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .rank-card .opportunity {
    font-size: 13px;
    color: var(--gold);
    text-align: right;
    max-width: 200px;
    line-height: 1.5;
    padding: 4px 0;
  }

  /* 脉搏标签 */
  .pulse-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 12px;
    margin: 2px 4px 2px 0;
    font-weight: 500;
  }
  .pulse-model { background: rgba(108,92,231,.2); color: #a78bfa; border: 1px solid rgba(108,92,231,.3); }
  .pulse-open { background: rgba(0,206,201,.12); color: #00cec9; border: 1px solid rgba(0,206,201,.2); }
  .pulse-company { background: rgba(253,121,168,.12); color: #fd79a8; border: 1px solid rgba(253,121,168,.2); }
  .pulse-agent { background: rgba(253,203,110,.12); color: #fdcb6e; border: 1px solid rgba(253,203,110,.2); }
  .pulse-tool { background: rgba(116,185,255,.12); color: #74b9ff; border: 1px solid rgba(116,185,255,.2); }
  .pulse-price { background: rgba(85,239,196,.12); color: #55efc4; border: 1px solid rgba(85,239,196,.2); }

  .pulse-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 20px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .pulse-section p { margin-top: 8px; font-size: 14px; color: var(--text-muted); }

  /* 深度延伸 */
  .deep-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 20px;
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .deep-card h3 { font-size: 15px; color: var(--accent2); margin-bottom: 6px; }
  .deep-card p, .deep-card li { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
  .deep-card ul { padding-left: 18px; }
  .deep-card li { margin: 4px 0; }
  .deep-card .tag {
    display: inline-block;
    font-size: 11px;
    padding: 1px 8px;
    border-radius: 10px;
    background: rgba(108,92,231,.15);
    color: #a78bfa;
    margin-right: 4px;
  }

  /* 页脚 */
  .footer {
    margin-top: 48px;
    padding: 20px;
    text-align: center;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: #555577;
  }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { color: var(--accent2); text-decoration: underline; }

  /* 响应式 */
  @media (max-width: 600px) {
    .rank-card { grid-template-columns: 30px 1fr; }
    .rank-card .opportunity { grid-column: span 2; text-align: left; max-width: none; }
    .hero h1 { font-size: 22px; }
    .container { padding: 16px 14px 40px; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>✦ AI 日报 ✦</h1>
  <div class="date">___DATE___ · 星期六</div>
  <div class="badge">每日早 6 点 · 小关出品</div>
</div>

<div class="container">

</div>

</body>
</html>
