<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI日报 · ___DATE___</title>
<style>
:root {
  --black: #000000;
  --gray-bg: #f5f5f7;
  --text: #1d1d1f;
  --text-secondary: rgba(0,0,0,.72);
  --text-tertiary: rgba(0,0,0,.48);
  --blue: #0071e3;
  --blue-dark: #0066cc;
  --white: #ffffff;
  --card-shadow: rgba(0,0,0,.12) 0px 2px 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--gray-bg);
  color: var(--text);
  line-height: 1.47;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -.01em;
}

/* 深色顶部 */
.dark-section {
  background: var(--black);
  color: var(--white);
  text-align: center;
  padding: 80px 24px 56px;
}
.dark-section .eyebrow {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: .5em;
  text-transform: uppercase;
  color: rgba(255,255,255,.6);
  margin-bottom: 8px;
}
.dark-section h1 {
  font-size: 48px;
  font-weight: 600;
  line-height: 1.07;
  letter-spacing: -.015em;
}
.dark-section .sub {
  font-size: 17px;
  font-weight: 400;
  color: rgba(255,255,255,.6);
  margin-top: 8px;
  letter-spacing: -.01em;
}

/* 核心容器 */
.container { max-width: 680px; margin: 0 auto; padding: 0 20px; }

/* 音频条 — 极简灰 */
.audio-bar {
  background: var(--white);
  border-radius: 12px;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: -28px auto 20px;
  max-width: 400px;
  box-shadow: var(--card-shadow);
  position: relative;
  z-index: 1;
}
.audio-bar .label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-tertiary);
  white-space: nowrap;
  letter-spacing: .02em;
}
.audio-bar audio {
  flex: 1;
  min-width: 0;
  height: 28px;
}

/* 今日焦点 — 大号灰色卡片 */
.focus {
  background: var(--white);
  border-radius: 16px;
  padding: 28px 32px;
  margin: 24px auto;
  box-shadow: var(--card-shadow);
  text-align: center;
}
.focus .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 6px;
}
.focus p {
  font-size: 19px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.4;
  letter-spacing: -.01em;
}

/* 卡片 */
.card {
  background: var(--white);
  border-radius: 16px;
  padding: 24px 28px;
  margin-bottom: 14px;
  box-shadow: var(--card-shadow);
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 16px;
}

/* TOP 列表 */
.item-list { list-style: none; }
.item {
  display: flex;
  gap: 12px;
  padding: 13px 0;
  border-bottom: 1px solid rgba(0,0,0,.06);
}
.item:last-child { border-bottom: none; }
.item .rank {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-tertiary);
  min-width: 20px;
  text-align: right;
  line-height: 1.5;
}
.item .body { flex: 1; min-width: 0; }
.item .name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.item .desc {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  margin-top: 1px;
  line-height: 1.5;
}
.item .opp {
  font-size: 13px;
  font-weight: 400;
  color: var(--blue);
  margin-top: 3px;
}
.item .opp:hover { text-decoration: underline; cursor: default; }

/* 脉搏 */
.pulse-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.pulse-tag {
  font-size: 12px;
  font-weight: 500;
  padding: 3px 12px;
  border-radius: 980px;
  background: var(--gray-bg);
  color: var(--text-secondary);
  letter-spacing: -.01em;
}
.pulse-body {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* 深度 */
.deep-item {
  padding: 13px 0;
  border-bottom: 1px solid rgba(0,0,0,.06);
}
.deep-item:last-child { border-bottom: none; }
.deep-item h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  letter-spacing: -.01em;
}
.deep-item p, .deep-item li {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.6;
}
.deep-item ul { padding-left: 18px; }
.deep-item li { margin: 2px 0; }

/* 链接 */
.link-pill {
  display: inline-block;
  color: var(--blue-dark);
  font-size: 14px;
  font-weight: 400;
  text-decoration: none;
  border: 1px solid var(--blue-dark);
  border-radius: 980px;
  padding: 4px 16px;
  transition: all .2s;
}
.link-pill:hover {
  background: var(--blue-dark);
  color: var(--white);
}

/* 页脚 */
.footer {
  text-align: center;
  padding: 32px 0 48px;
}
.footer a {
  color: var(--blue-dark);
  font-size: 14px;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .dark-section { padding: 56px 20px 40px; }
  .dark-section h1 { font-size: 32px; }
  .focus { padding: 20px 16px; }
  .focus p { font-size: 17px; }
  .card { padding: 18px 16px; border-radius: 14px; }
  .audio-bar { margin-left: 12px; margin-right: 12px; }
}
</style>
</head>
<body>

<div class="dark-section">
  <div class="eyebrow">AI 日报</div>
  <h1>___DATE___</h1>
  <div class="sub">每天早 6 点 · 小关出品</div>
</div>

<div class="container">

<div class="audio-bar">
  <span class="label">🎧 收听</span>
  <audio controls preload="none" style="height:28px">
    <source src="___DATE___.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="focus">
  <div class="label">今日焦点</div>
  <p>___SUMMARY___</p>
</div>

___CONTENT___

<div class="footer">
  <a href="https://daily.guancn.me">查看全部历史 →</a>
</div>

</div>

</body>
</html>
