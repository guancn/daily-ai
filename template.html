<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI日报 · ___DATE___</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --black: #171717;
  --gray-600: #4d4d4d;
  --gray-400: #808080;
  --gray-100: #ebebeb;
  --gray-50: #fafafa;
  --blue: #0072f5;
  --shadow-border: rgba(0,0,0,.08) 0px 0px 0px 1px;
  --shadow-card: rgba(0,0,0,.08) 0px 0px 0px 1px, rgba(0,0,0,.04) 0px 2px 2px, #fafafa 0px 0px 0px 1px;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Geist', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--black);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.header {
  max-width: 680px;
  margin: 0 auto;
  padding: 56px 24px 0;
  text-align: center;
}
.header h1 {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gray-400);
}
.header .date {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -1.28px;
  margin-top: 4px;
  color: var(--black);
}
.header .sub {
  font-size: 14px;
  color: var(--gray-600);
  margin-top: 6px;
  font-weight: 400;
}

.container { max-width: 620px; margin: 0 auto; padding: 28px 20px 60px; }

/* 音频播放器 — 极简 */
.audio-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  padding: 8px 12px;
  background: var(--gray-50);
  border-radius: 6px;
  box-shadow: var(--shadow-border);
}
.audio-wrap .label {
  font-size: 12px;
  font-weight: 500;
  color: var(--gray-400);
  white-space: nowrap;
  letter-spacing: .3px;
  text-transform: uppercase;
}
.audio-wrap audio {
  flex: 1;
  min-width: 0;
  height: 32px;
  border-radius: 4px;
}

/* 今日焦点 — 一句话 */
.focus {
  font-size: 15px;
  line-height: 1.7;
  color: var(--gray-600);
  margin-bottom: 28px;
  padding: 0 2px;
}
.focus strong { color: var(--black); font-weight: 500; }

/* 分割线 */
.divider { border: none; border-top: 1px solid var(--gray-100); margin: 24px 0; }

/* 章节标题 */
.section-title {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .3px;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 16px;
}

/* TOP 10 列表 */
.item-list { list-style: none; }
.item {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--gray-100);
}
.item:last-child { border-bottom: none; }
.item .rank {
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-400);
  min-width: 22px;
  text-align: right;
  line-height: 1.5;
}
.item .body { flex: 1; min-width: 0; }
.item .name {
  font-size: 15px;
  font-weight: 500;
  color: var(--black);
  letter-spacing: -.3px;
}
.item .desc {
  font-size: 14px;
  color: var(--gray-600);
  margin-top: 1px;
  line-height: 1.5;
}
.item .opp {
  font-size: 13px;
  color: var(--blue);
  margin-top: 3px;
  font-weight: 500;
}

/* 市场脉搏 */
.pulse-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.pulse-tag {
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 999px;
  font-weight: 500;
  background: var(--gray-50);
  color: var(--gray-600);
  box-shadow: var(--shadow-border);
}
.pulse-body {
  font-size: 14px;
  color: var(--gray-600);
  line-height: 1.7;
}

/* 深度延伸 */
.deep-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--gray-100);
}
.deep-item:last-child { border-bottom: none; }
.deep-item h3 {
  font-size: 14px;
  font-weight: 500;
  color: var(--black);
  margin-bottom: 3px;
}
.deep-item p, .deep-item li {
  font-size: 14px;
  color: var(--gray-600);
  line-height: 1.7;
}
.deep-item ul { padding-left: 18px; }
.deep-item li { margin: 2px 0; }

/* 页脚 */
.footer {
  margin-top: 48px;
  padding: 20px 0 0;
  text-align: center;
  border-top: 1px solid var(--gray-100);
}
.footer a {
  font-size: 13px;
  color: var(--gray-400);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: var(--gray-100);
}
.footer a:hover { color: var(--black); }

@media (max-width: 480px) {
  .header { padding-top: 36px; }
  .header .date { font-size: 24px; letter-spacing: -.8px; }
  .container { padding: 20px 14px 40px; }
  .item { gap: 10px; }
  .item .rank { min-width: 18px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>AI 日报</h1>
  <div class="date">___DATE___</div>
  <div class="sub">每天早 6 点 · 小关出品</div>
</div>

<div class="container">

<div class="audio-wrap">
  <span class="label">🎧 听</span>
  <audio controls preload="none">
    <source src="___DATE___.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="focus"><strong>___SUMMARY___</strong></div>

<hr class="divider">

___CONTENT___

<div class="footer">
  <a href="https://daily.guancn.me">查看历史 →</a>
</div>

</div>

</body>
</html>
